<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where da Gold at</title>
    <style>
        :root {
            --bg-0: #05060a;
            --bg-1: #0b0e17;
            --panel: #11141f;
            --border: #232838;
            --text: #e8ecf7;
            --text-dim: #8b93a8;
            --c1: #00f0ff;
            --c2: #ff2ec4;
            --c3: #7c5cff;
            --c4: #ffb800;
            --c5: #39ff88;
            --c6: #ff5252;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
            text-align: center;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 10%, rgba(124, 92, 255, 0.18), transparent 40%),
                radial-gradient(circle at 85% 0%, rgba(0, 240, 255, 0.14), transparent 45%),
                radial-gradient(circle at 50% 100%, rgba(255, 46, 196, 0.10), transparent 50%),
                var(--bg-0);
            padding: 28px 16px 48px;
        }

        header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 0 0 4px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-dim);
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            max-width: 1000px;
            margin: 24px auto;
        }

        .button {
            --glow: var(--c1);
            position: relative;
            padding: 18px 10px;
            min-height: 74px;
            background: linear-gradient(160deg, var(--panel), var(--bg-1));
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            transition: transform 0.08s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .button::before {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            top: 6px;
            height: 3px;
            border-radius: 3px;
            background: var(--glow);
            opacity: 0.55;
            box-shadow: 0 0 8px var(--glow);
        }

        .button:hover {
            border-color: var(--glow);
            box-shadow: 0 0 18px -2px var(--glow), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0) scale(0.97);
        }

        .button.playing {
            border-color: var(--glow);
            background: linear-gradient(160deg, var(--panel), #171b2b);
            box-shadow: 0 0 26px 2px var(--glow), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            animation: pulse 1.1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 18px 0 var(--glow), inset 0 0 0 1px rgba(255,255,255,0.05); }
            50% { box-shadow: 0 0 30px 4px var(--glow), inset 0 0 0 1px rgba(255,255,255,0.08); }
        }

        .lep {
            margin-top: 32px;
            opacity: 0.9;
        }

        .lep img {
            max-width: 220px;
            border-radius: 10px;
            box-shadow: 0 0 24px rgba(124, 92, 255, 0.25);
        }
    </style>
</head>
<body>
    <header>
        <h1>Click a pad to play / stop</h1>
        <div class="subtitle">Digital Sound Board</div>
    </header>

    <div class="grid" id="soundboard"></div>

    <div class="lep">
        
    </div>

    <script>

            { file: 'sound42.mp3', label: 'LETS GET READY' },
            { file: 'sound43.mp3', label: 'TRUMP ZELENSKY ' },

        ];

        const glowColors = ['--c1', '--c2', '--c3', '--c4', '--c5', '--c6'];

        const soundboard = document.getElementById('soundboard');
        let currentAudio = null;
        let currentButton = null;

        sounds.forEach((sound, i) => {
            const button = document.createElement('button');
            button.className = 'button';
            button.textContent = sound.label;
            button.style.setProperty('--glow', `var(${glowColors[i % glowColors.length]})`);

            button.onclick = () => {
                if (currentAudio && !currentAudio.paused) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                    currentAudio = null;
                    if (currentButton) currentButton.classList.remove('playing');
                    currentButton = null;
                } else {
                    currentAudio = new Audio(`sounds/${sound.file}`);
                    currentAudio.play();
                    currentButton = button;
                    button.classList.add('playing');
                    currentAudio.addEventListener('ended', () => {
                        button.classList.remove('playing');
                        currentAudio = null;
                        currentButton = null;
                    });
                }
            };

            soundboard.appendChild(button);
        });
    </script>
</body>
</html>
